# ------------------------------------------------------------------ screening --
screening:
  min_years_history: 10
  debt_equity_max: 200.0       # radically relaxed for miners/cyclicals
  pb_max: 10.0                 # relaxed
  ev_ebitda_max: 50.0          # relaxed
  pe_max: 100.0                # relaxed
  pfcf_max: 100.0              # relaxed
  roe_min: -1.0                # allow negative ROE in down cycle
  fcf_yield_min: -0.5          # allow negative FCF yield
  dilution_max: 0.25           # 25% annual dilution allowed (common in mining)
  technical:
    short_sma: 50
    long_sma: 200
    volume_multiplier: 1.5
    rsi_oversold: 30
    rsi_overbought: 70
  sector:
    use_percentile: true
    percentile_threshold: 30
    pct_of_5y_high: 0.70
    pct_of_10y_high: 0.80
