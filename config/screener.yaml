# ------------------------------------------------------------------ screening --
screening:
  min_years_history: 10
  debt_equity_max: 200.0
  pb_max: 10.0
  ev_ebitda_max: 50.0
  pe_max: 100.0
  pfcf_max: 100.0
  roe_min: -1.0
  fcf_yield_min: -0.5
  dilution_max: 0.25
  technical:
    short_sma: 50
    long_sma: 200
    volume_multiplier: 1.5
    rsi_oversold: 30
    rsi_overbought: 70
  sector:
    use_percentile: true
    percentile_threshold: 30
    pct_of_5y_high: 0.70
    pct_of_10y_high: 0.80
