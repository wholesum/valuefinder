# ==============================================================================
# Value Screener – Configuration (Enhanced)
# ==============================================================================

macro:
  commodity_index: "^BCOM"
  stock_index: "^GSPC"
  gold: "GC=F"
  lookback_years: 25
  cheap_percentile: 25
  # New: gold/sp500 ratio threshold
  gold_sp_percentile: 20   # gold cheap relative to stocks? (lower = gold cheap)

sectors:
  # ... (keep your existing sectors, no changes needed)

screening:
  min_years_history: 10
  # ---- Debt & Solvency ----
  debt_equity_max: 3.0
  current_ratio_min: 1.0       # optional
  interest_coverage_min: 3.0   # optional
  
  # ---- Value Metrics ----
  pb_max: 3.0
  ev_ebitda_max: 15.0
  pe_max: 25.0                 # new
  pfcf_max: 30.0               # new
  roe_min: 0.10                # new (10%)
  fcf_yield_min: 0.04          # new (4%)

  # ---- Dilution ----
  dilution_max: 0.05

  # ---- Technical ----
  technical:
    short_sma: 50
    long_sma: 200
    volume_multiplier: 1.5
    rsi_oversold: 30           # new
    rsi_overbought: 70         # new

  # ---- Sector Screening ----
  sector:
    use_percentile: true       # new: use percentile instead of fixed high thresholds
    percentile_threshold: 30   # current price below 30th percentile = hated
    # Fallback to old method if percentile fails
    pct_of_5y_high: 0.70
    pct_of_10y_high: 0.80
