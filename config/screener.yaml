# ------------------------------------------------------------------ screening --
screening:
  min_years_history: 10

  # ---- Debt & Solvency ----
  debt_equity_max: 3.0
  current_ratio_min: 1.0
  interest_coverage_min: 3.0

  # ---- Value Metrics ----
  pb_max: 3.0
  ev_ebitda_max: 15.0
  pe_max: 25.0
  pfcf_max: 30.0
  roe_min: 0.10
  fcf_yield_min: 0.04

  # ---- Dilution ----
  dilution_max: 0.05

  # ---- Technical ----
  technical:
    short_sma: 50
    long_sma: 200
    volume_multiplier: 1.5
    rsi_oversold: 30
    rsi_overbought: 70

  # ---- Sector Screening ----
  sector:
    use_percentile: true
    percentile_threshold: 30
    pct_of_5y_high: 0.70
    pct_of_10y_high: 0.80
